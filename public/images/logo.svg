<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Teal Leaf Shape -->
  <path d="M 100 20 Q 140 50 140 100 Q 140 150 100 180 Q 60 150 60 100 Q 60 50 100 20" fill="#5B9FA3" opacity="0.95"/>
  
  <!-- Gold Hand -->
  <g transform="translate(70, 90)">
    <!-- Palm -->
    <ellipse cx="15" cy="20" rx="12" ry="18" fill="#B8860B"/>
    <!-- Thumb -->
    <path d="M 8 20 Q 5 15 8 10" stroke="#B8860B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Fingers -->
    <path d="M 15 5 Q 15 0 15 -5" stroke="#B8860B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 22 10 Q 25 5 26 0" stroke="#B8860B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Water Droplet -->
  <path d="M 105 70 Q 105 65 108 60 Q 110 55 112 60 Q 112 65 108 75 Q 105 75 105 70" fill="white"/>

  <!-- Stars -->
  <g fill="white">
    <!-- Star 1 -->
    <circle cx="115" cy="50" r="2.5"/>
    <!-- Star 2 -->
    <circle cx="122" cy="58" r="1.8"/>
    <!-- Star 3 -->
    <circle cx="118" cy="70" r="1.5"/>
  </g>

  <!-- Curved accent line -->
  <path d="M 90 50 Q 100 60 95 80" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
